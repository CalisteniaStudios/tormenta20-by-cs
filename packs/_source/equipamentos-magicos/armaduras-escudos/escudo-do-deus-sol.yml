system:
  description:
    value: >-
      <p>Este <strong>escudo pesado guardião</strong> é forjado na forma de um
      sol estilizado. Você pode gastar uma ação padrão e 10 PM para fazê-lo
      emitir uma luz brilhante e quente num cone com alcance curto. A luz gera
      os efeitos da magia Visão da Verdade e causa [[/r 6d6]] pontos de dano de
      fogo em todos os seus inimigos (mortos-vivos e criaturas vulneráveis a luz
      solar sofrem [[/r 6d8]] pontos de dano). Você pode gastar 1 PM no início
      de cada um de seus turnos para manter a luz.</p><p><b>Guardião</b> O item
      emite um campo de força que desvia ataques. O bônus na Defesa do item
      aumenta em +4. Pré-requisito: defensor.</p>
