system:
  description:
    value: >-
      <p>Este <strong>escudo leve defensor</strong> tem uma pequena tira de
      couro na parte interna, sobre a qual um conjurador pode lançar uma magia.
      A magia não surte efeito na hora; em vez disso, fica inscrita na tira. A
      tira pode então ser lida como um pergaminho. Uma vez que a magia seja
      lançada, outra pode ser inscrita.</p><p><b>Defensor</b> O item é encantado
      para desviar golpes. O bônus na Defesa do item aumenta em +2</p>
