system:
  description:
    value: >-
      <p>Este manto marrom escuro ou negro fornece +5 em Furtividade e permite
      que voc&ecirc; fique pendurado de ponta-cabe&ccedil;a no teto, como um
      morcego. Al&eacute;m disso, voc&ecirc; pode gastar uma a&ccedil;&atilde;o
      padr&atilde;o para segurar as pontas do manto e se transformar em um
      morcego. Seu tamanho muda para Min&uacute;sculo e voc&ecirc; recebe
      deslocamento de voo 12m e uma arma natural de mordida (dano 1d4,
      perfura&ccedil;&atilde;o). Em outros aspectos, isso funciona como a Forma
      Selvagem do druida. Voc&ecirc; s&oacute; pode se transformar em morcego
      &agrave; noite ou em ambientes escuros.</p>
