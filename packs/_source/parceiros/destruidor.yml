system:
  description:
    value: >-
      <p>Cada parceiro pode ajudar apenas um personagem por vez. No
      in&iacute;cio do seu turno, voc&ecirc; pode gastar uma a&ccedil;&atilde;o
      de movimento para passar um parceiro para outro personagem em alcance
      curto at&eacute; o fim da cena (para fazer isso com um animal, voc&ecirc;
      precisa ser treinado em Adestramento).</p>

      <p>Um arcanista ou inventor com itens alqu&iacute;micos.</p>

      <p><strong>Iniciante</strong>: uma vez por rodada, como uma
      a&ccedil;&atilde;o livre, voc&ecirc; pode gastar 1 PM para causar 2d6
      pontos de dano de &aacute;cido, eletricidade, fogo ou frio (de acordo com
      o parceiro) em um alvo em alcance curto.</p>

      <p><strong>Veterano</strong>: como acima, mas voc&ecirc; tamb&eacute;m
      pode gastar 2 PM para causar 4d6 pontos de dano.</p>

      <p><strong>Mestre</strong>: como acima, mas voc&ecirc; tamb&eacute;m pode
      gastar 4 PM para causar 6d6 pontos de dano em uma &aacute;rea de 6m de
      raio em alcance m&eacute;dio.</p>
    unidentified: ''
  source: Tormenta20 — Edição Jogo do Ano, pág. 261
