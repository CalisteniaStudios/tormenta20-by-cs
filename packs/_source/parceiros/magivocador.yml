name: Magivocador
type: poder
img: systems/tormenta20/icons/itens/gerais/parceiros.webp
system:
  description:
    value: >-
      <p>Cada parceiro pode ajudar apenas um personagem por vez. No
      in&iacute;cio do seu turno, voc&ecirc; pode gastar uma a&ccedil;&atilde;o
      de movimento para passar um parceiro para outro personagem em alcance
      curto at&eacute; o fim da cena (para fazer isso com um animal, voc&ecirc;
      precisa ser treinado em Adestramento).</p>

      <p>Um conjurador especializado em magias ofensivas.</p>

      <p><strong>Iniciante:&nbsp;</strong>o dano de suas magias aumenta em +1
      dado do mesmo tipo.</p>

      <p><strong>Veterano:</strong>&nbsp;como acima, e a CD para resistir a suas
      magias aumenta em +1.</p>

      <p><strong>Mestre:</strong> como acima, e o dano de suas magias aumenta em
      +1 por dado (para um total de +2 dados).</p>
    unidentified: ''
  source: T20, pg. 261 (JdA)
