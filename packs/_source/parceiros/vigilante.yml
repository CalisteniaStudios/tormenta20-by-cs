system:
  description:
    value: >-
      <p>Cada parceiro pode ajudar apenas um personagem por vez. No
      in&iacute;cio do seu turno, voc&ecirc; pode gastar uma a&ccedil;&atilde;o
      de movimento para passar um parceiro para outro personagem em alcance
      curto at&eacute; o fim da cena (para fazer isso com um animal, voc&ecirc;
      precisa ser treinado em Adestramento).</p>

      <p>Um vigia ou animal de guarda, sempre atento aos arredores.</p>

      <p><strong>Iniciante</strong>: +2 em Percep&ccedil;&atilde;o e
      Iniciativa.</p>

      <p><strong>Veterano</strong>: voc&ecirc; pode usar o poder Esquiva
      Sobrenatural.</p>

      <p><strong>Mestre</strong>: voc&ecirc; pode usar o poder Olhos nas
      Costas.</p>
    unidentified: ''
  source: Tormenta20 — Edição Jogo do Ano, p. 261
