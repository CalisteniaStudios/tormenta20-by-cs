system:
  description:
    value: >-
      <p><span><strong>[Material Especial]</strong></span></p>

      <p>Qualquer material de origem aberrante &mdash; desde suas garras e
      carapa&ccedil;as, at&eacute; min&eacute;rios e partes de estruturas
      encontradas em &aacute;reas de Tormenta &mdash; apresenta propriedades
      parecidas, sendo conhecido como &ldquo;mat&eacute;ria vermelha&rdquo;.
      Estes itens assustadores imp&otilde;em ao usu&aacute;rio penalidade de
      &ndash;2 em per&iacute;cias baseadas em Carisma (exceto
      Intimida&ccedil;&atilde;o).<br><strong>Arma.</strong> Causa +1d6 de dano
      extra. Por&eacute;m, sempre que voc&ecirc; acerta um ataque com a arma,
      perde 1 ponto de vida. Aberrantes s&atilde;o imunes tanto ao dano
      adicional de mat&eacute;ria vermelha quanto &agrave; perda de vida por
      usar armas desse material.<br><strong>Armadura e Escudo.</strong> Por sua
      apar&ecirc;ncia &ldquo;borrada&rdquo;, fornecem chance de falha para cada
      ataque: 10% para escudos e armaduras leves, 25% para armaduras pesadas
      (cumulativas entre si). Aberrante ignoram este
      efeito.<br><strong>Esot&eacute;rico.</strong> Voc&ecirc; e todos os seus
      inimigos em alcance curto sofrem &ndash;2 em testes de resist&ecirc;ncia
      contra efeitos m&aacute;gicos.</p>



      <p><span><strong>Pre&ccedil;o:</strong></span></p>

      <p><span><span>Armas: +T$ 1500</span></span></p>

      <p><span><span>Armaduras pesadas:<span style="font-family:
      var(--font-primary); font-size: var(--font-size-14);">+T$
      18000</span></span></span></p>

      <p><span><span>Armaduras leves e Escudo: +T$ 6000</span></span></p>

      <p><span><span>Esot&eacute;ricos: <span style="font-family:
      var(--font-primary); font-size: var(--font-size-14);">+T$
      3000</span></span></span></p>
