      regi&atilde;o glacial perigosa &agrave; ca&ccedil;a deste material
      fant&aacute;stico.<br><strong>Arma.</strong> Causa +2 pontos de dano por
      frio.<br><strong>Armadura e Escudo.</strong> Fornece redu&ccedil;&atilde;o
      de fogo: armaduras leves e escudos, resist&ecirc;ncia 5; armaduras
      pesadas, resist&ecirc;ncia 10.<br><strong>Es&oacute;terico.</strong>
      Quando causa dano com uma magia de frio, voc&ecirc; pode rolar novamente
      qualquer resultado 1.</span></p>



