system:
  description:
    value: >-
      <p><span><strong>[Material Especial]</strong></span></p>

      <p>Metal raro e valioso, o mitral &eacute; prateado, brilhante e mais leve
      que a&ccedil;o. Itens de mitral ocupam &ndash;1 espa&ccedil;o
      (m&iacute;nimo 1).<br><strong>Arma.</strong> Aumenta sua margem de
      amea&ccedil;a em 1. Por exemplo, uma espada longa de mitral tem margem de
      amea&ccedil;a 18-20.<br><strong>Armadura e Escudo. </strong>Tem sua
      penalidade de armadura diminu&iacute;da em 2. Armaduras pesadas de mitral
      permitem que voc&ecirc; aplique at&eacute; dois pontos de sua Destreza na
      Defesa.<br><strong>Esot&eacute;rico.</strong> Permite que voc&ecirc; pague
      +2 PM ao lan&ccedil;ar uma magia para aumentar a CD dela em +2.</p>



      <p><span><strong>Pre&ccedil;os:</strong></span></p>

      <p><span><span>Armas,</span></span><span style="font-family:
      var(--font-primary); font-size: var(--font-size-14);">Armaduras leves e
      Escudo: +T$ 1500</span></p>

      <p><span><span>Armaduras pesadas: +T$ 12000</span></span></p>

      <p><span><span>Esot&eacute;ricos: +T$ 3000</span></span></p>
