name: Couro de Dragão
type: consumivel
img: systems/tormenta20/icons/itens/gerais/couro-de-dragao.webp
system:
  description:
    value: >-
      <p><span><strong>[Tesouro Especial] <strong>[Material
      Especial]</strong></strong></span></p>

      <p>Cobi&ccedil;ado por artes&atilde;os em toda Arton, o couro escamado de
      um drag&atilde;o verdadeiro &eacute; um material especial que pode ser
      empregado para fabricar certos itens superiores. Tanto o couro bruto
      quanto itens de couro de drag&atilde;o n&atilde;o existem &agrave; venda;
      a &uacute;nica maneira de obter esse material &eacute; derrotar um
      drag&atilde;o. <span>(CD para extrair depende do
      drag&atilde;o).</span></p>



      <p><span><strong>Armaduras leves e escudos</strong> (exigem uma
      pe&ccedil;a para ser fabricado): Defesa +1, redu&ccedil;&atilde;o de dano
      10 contra o tipo de dano do sopro do drag&atilde;o e resist&ecirc;ncia a
      magia +2. </span></p>

      <p><span><strong>Armaduras pesadas</strong> (exigem tr&ecirc;s
      pe&ccedil;as): Defesa +2, redu&ccedil;&atilde;o de dano 20 contra o tipo
      de dano do sopro do drag&atilde;o e resist&ecirc;ncia a magia +5.
      </span></p>

      <p><span><strong>Esot&eacute;rico </strong>(Exige 1 Pe&ccedil;a). Quando
      lan&ccedil;a uma magia que cause dano do mesmo tipo do sopro do
      drag&atilde;o, voc&ecirc; pode gastar 1 PM para aumentar o dano da magia
      em +1 por dado.</span></p>
