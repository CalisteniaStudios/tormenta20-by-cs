system:
  description:
    value: >-
      <p>Roupas t&iacute;picas de campon&ecirc;s. Consiste de camisa larga e
      cal&ccedil;as soltas ou blusa e saia e n&atilde;o inclui botas &mdash; os
      mais pobres andam descal&ccedil;os. Fornece +2 em testes de
      Investiga&ccedil;&atilde;o para interrogar (ningu&eacute;m se importa com
      o que um alde&atilde;o escuta) e, se voc&ecirc; possuir o poder
      Apar&ecirc;ncia Inofensiva, a CD para resistir a ele aumenta em +2.
      Por&eacute;m, imp&otilde;e &ndash;2 em per&iacute;cias baseadas em
      Carisma&nbsp; contra pessoas que se importam com classe social.</p>
