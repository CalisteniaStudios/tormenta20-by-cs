system:
  description:
    value: >-
      <blockquote>

      <p>Para aqueles acostumados com a ang&uacute;stia de um menestrel maldito,
      sua incr&iacute;vel habilidade torna a m&uacute;sica muito
      agrad&aacute;vel. Para os desavisados, por&eacute;m, sua tristeza pode ser
      infecciosa.</p>

      </blockquote>

      <p class="MsoNormal">Sua habilidade Inspira&ccedil;&atilde;o s&oacute;
      funciona com aqueles familiarizados com a trag&eacute;dia que o levou a
      procurar o dem&ocirc;nio azul (em termos de regras, qualquer pessoa para
      quem voc&ecirc; tenha contado sua hist&oacute;ria). Quaisquer outras
      criaturas no alcance, em vez disso, ficam
      @UUID[JournalEntry.s15J5SOYixL3Ajzr.JournalEntryPage.bD6XAyHQrWYr0BTQ]{Atordoado}
      por uma rodada (CD Car evita). Uma criatura s&oacute; pode ser atordoada
      por este poder uma vez por cena.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisito</em>: T&eacute;cnica
      Endiabrada.</p>
