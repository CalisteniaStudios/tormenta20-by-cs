name: 'Música: Nota Azul'
type: poder
img: systems/tormenta20/icons/poderes/distincao.webp
system:
  description:
    value: >-
      <blockquote>

      <p style="text-align: justify;">&Eacute; um risco se deixar levar pela
      m&uacute;sica de um menestrel maldito. Os acordes hipn&oacute;ticos podem
      n&atilde;o apenas conquistar sua aten&ccedil;&atilde;o, mas tamb&eacute;m
      consumir sua mente e levar &agrave; morte.</p>

      </blockquote>

      <p class="MsoNormal" style="text-align: justify;">Voc&ecirc; pode emitir
      uma nota musical carregada de tristeza e dor. Fa&ccedil;a um &uacute;nico
      teste de Atua&ccedil;&atilde;o oposto &agrave; Vontade de cada criatura a
      sua escolha. Criaturas que falharem sofrem 1d6 pontos de dano mental. Para
      cada outro poder de Menestrel Maldito que possuir, voc&ecirc; pode gastar
      +1 PM para aumentar este dano em +1d6. Usar esta m&uacute;sica conta como
      se concentrar para manter o efeito de Fascinar.</p>

      <p class="MsoNormal" style="text-align:
      justify;"><em>Pr&eacute;-requisitos</em>: Fascinar, T&eacute;cnica
      Endiabrada.</p>

      <p style="text-align: justify;"><strong>M&uacute;sicas de
      Bardo</strong></p>

      <p style="text-align: justify;">Alguns poderes do bardo s&atilde;o
      M&uacute;sicas. Esses poderes compartilham as seguintes regras.</p>

      <p style="text-align: justify;">&bull; Para ativar uma m&uacute;sica,
      voc&ecirc; precisa ser treinado em Atua&ccedil;&atilde;o e empunhar um
      instrumento musical (veja a p&aacute;gina 159).</p>

      <p style="text-align: justify;">&bull; Ativar uma m&uacute;sica gasta uma
      a&ccedil;&atilde;o padr&atilde;o e 1 PM.</p>

      <p style="text-align: justify;">&bull; Efeitos de m&uacute;sicas t&ecirc;m
      alcance curto.</p>

      <p style="text-align: justify;">&nbsp;</p>
