system:
  description:
    value: >-
      <blockquote>

      <p>Ningu&eacute;m pode decidir quem recebe o dom da magia. Mas o
      inquisidor pode punir o mau uso dessa d&aacute;diva com a chama essencial
      de Wynna.</p>

      </blockquote>

      <p class="MsoNormal">Quando usa Golpe Purificador, voc&ecirc; pode gastar
      3 PM para criar uma onda de dispers&atilde;o m&aacute;gica com o efeito de
      @UUID[Item.rfTGYwrXLjcIAIP5]{Dissipar Magia} que afeta todas as criaturas,
      a sua escolha, em alcance curto do alvo de seu golpe. Para cada efeito que
      foi dissipado sobre si, uma criatura na &aacute;rea sofre 2d6 pontos de
      dano de ess&ecirc;ncia. Para cada dois outros poderes de inquisidor da
      Magia, voc&ecirc; recebe +1 nesse teste de Misticismo.</p>

      <p class="MsoNormal">Pr&eacute;-requisito: Golpe Purificador</p>
