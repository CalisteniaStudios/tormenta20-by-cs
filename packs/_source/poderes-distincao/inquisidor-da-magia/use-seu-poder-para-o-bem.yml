system:
  description:
    value: >-
      <blockquote>

      <p>Quando confrontados com arcanos vilanescos, os inquisidores tentam
      fazer com que a b&ecirc;n&ccedil;&atilde;o da Magia seja usada para fins
      heroicos.</p>

      </blockquote>

      <p class="MsoNormal">Voc&ecirc; pode gastar uma a&ccedil;&atilde;o
      padr&atilde;o e 3 PM para fazer um teste de Misticismo oposto &agrave;
      Vontade de uma criatura m&aacute;gica ou conjurador arcano em alcance
      curto. Se vencer o teste oposto, voc&ecirc; causa &agrave; criatura 1d6
      pontos de dano de ess&ecirc;ncia por poder de Inquisidor da Magia que
      possuir e voc&ecirc; e seus aliados em alcance curto recuperam a mesma
      quantidade de PV. Se o alvo vencer o teste oposto, ele n&atilde;o
      poder&aacute; mais ser afetado por este poder por um dia.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisito:</em> Ben&ccedil;&atilde;o
      Arcana.</p>
