      b&ocirc;nus de Carisma no teste de ataque e, se acertar, gera o efeito
      b&aacute;sico da magia @UUID[Item.rfTGYwrXLjcIAIP5]{Dissipar Magia}&nbsp;
      tendo como alvo a criatura atingida.</p>

      <p class="MsoNormal">Pr&eacute;-requisito: Ben&ccedil;&atilde;o
      Arcana.</p>
