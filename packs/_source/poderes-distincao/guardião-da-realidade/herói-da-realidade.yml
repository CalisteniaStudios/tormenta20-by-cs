system:
  description:
    value: >-
      <blockquote>

      <p>Por saberem que seu dever &eacute; o mais exigente de todos, os
      guardi&otilde;es da realidade possuem uma reserva de fibra e for&ccedil;a
      de vontade que nenhum outro her&oacute;i possui.</p>

      </blockquote>

      <p>Quando sofre dano ou falha em um teste de resist&ecirc;ncia, voc&ecirc;
      pode gastar uma rea&ccedil;&atilde;o e 5 PM para reduzir esse dano
      &agrave; metade ou repetir este teste de resist&ecirc;ncia. Se a fonte do
      efeito for uma criatura extraplanar, em vez disso voc&ecirc; ignora o dano
      ou recebe +5 no teste de resist&ecirc;ncia. O custo deste poder diminui em
      &ndash;1 PM para cada dois outros poderes de guardi&atilde;o da realidade
      que voc&ecirc; possuir. <em>Pr&eacute;-requisito:</em> Basti&atilde;o da
      Realidade, outro poder de guardi&atilde;o da realidade.</p>
