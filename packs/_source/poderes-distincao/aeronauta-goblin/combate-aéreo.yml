system:
  description:
    value: >-
      <blockquote>

      <p>O aeronauta goblin sabe se virar contra inimigos nas alturas.</p>

      </blockquote>

      <p>Voc&ecirc; pode conduzir aeronaves com uma a&ccedil;&atilde;o livre e
      n&atilde;o sofre penalidades para atacar &agrave; dist&acirc;ncia ou
      lan&ccedil;ar magias por estar a bordo de uma aeronave. Por fim, quando
      est&aacute; a bordo de uma aeronave, voc&ecirc; recebe +1 em testes de
      ataque, em rolagens de dano e na CD para resistir &agrave;s suas
      habilidades e itens. Este b&ocirc;nus aumenta em +1 para cada dois outros
      poderes de aeronauta goblin que voc&ecirc; possui.
      <em>Pr&eacute;-requisito:</em> treinado em Pilotagem.</p>
