    value: >-
      <blockquote>

      <p>&Agrave;s vezes, mais importante que preservar a pr&oacute;pria
      vida<br>&eacute; proteger sua aeronave &mdash; afinal, se ela cair, o
      piloto pode<br>virar mingau!</p>

      </blockquote>

      <p>Voc&ecirc; soma seu b&ocirc;nus de Intelig&ecirc;ncia na Defesa das
      aeronaves que estiver pilotando. Al&eacute;m disso, uma vez por rodada,
      quando voc&ecirc; ou uma aeronave que estiver pilotando sofrer dano,
      voc&ecirc; pode gastar uma rea&ccedil;&atilde;o e 2 PM para executar uma
      manobra defensiva. Fa&ccedil;a um teste de Pilotagem e reduza o dano
      sofrido em um valor igual ao resultado deste teste.
      <em>Pr&eacute;-requisitos:</em> treinado em Reflexos, Combate
      A&eacute;reo.</p>
