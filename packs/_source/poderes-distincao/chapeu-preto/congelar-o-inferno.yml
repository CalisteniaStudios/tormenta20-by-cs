  description:
    value: >-
      <blockquote>

      <p>Quando surge um bandido realmente assustador, o tempo esfria, o sol
      empalidece, os animais fogem, e at&eacute; as pedras tremem de medo. Os
      mais infames chap&eacute;us pretos podem fazer uma est&aacute;tua baixar
      os olhos.</p>

      </blockquote>

      <p>Quando usa uma habilidade que gera um efeito de medo, voc&ecirc; pode
      gastar 2 PM para ignorar quaisquer imunidades a medo e efeitos mentais dos
      alvos da habilidade.</p>

      <p>Pr&eacute;-requisitos: Cora&ccedil;&atilde;o duro, dois outros poderes
      de chap&eacute;u preto.</p>
