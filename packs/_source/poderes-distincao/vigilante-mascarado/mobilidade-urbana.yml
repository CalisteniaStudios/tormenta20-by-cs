name: Mobilidade Urbana
type: poder
img: systems/tormenta20/icons/poderes/distincao.webp
system:
  description:
    value: >-
      <blockquote>

      <p>O vigilante mascarado fica completamente &agrave; vontade em terreno
      urbano.</p>

      </blockquote>

      <p class="MsoNormal">Quando est&aacute; vestindo seu traje das sombras em
      terreno urbano, voc&ecirc; recebe +2 na Defesa e em Acrobacia, Atletismo,
      Investiga&ccedil;&atilde;o, Percep&ccedil;&atilde;o e Sobreviv&ecirc;ncia.
      Esse b&ocirc;nus aumenta em +1 para cada dois outros poderes de vigilante
      mascarado. Al&eacute;m disso, se estiver em terreno elevado (como em um
      telhado), voc&ecirc; pode gastar 2 PM para fazer uma investida pulando
      sobre um oponente no ch&atilde;o. Fa&ccedil;a um teste de Acrobacia para
      amortecer queda (Tormenta20, p. 115). Al&eacute;m dos efeitos normais da
      investida, para cada dado de dano de queda que voc&ecirc; reduzir desta
      forma, seu ataque causa +1d6 pontos de dano.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisitos:</em> treinado em
      Acrobacia, Traje das Sombras.</p>
