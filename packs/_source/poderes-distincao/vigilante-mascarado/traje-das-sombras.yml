name: Traje das Sombras
type: poder
img: systems/tormenta20/icons/poderes/distincao.webp
system:
  description:
    value: >-
      <blockquote>

      <p>O vigilante mascarado oculta sua identidade com um traje especial,
      facilmente reconhec&iacute;vel por seus inimigos.</p>

      </blockquote>

      <p class="MsoNormal">Voc&ecirc; transforma sua fantasia improvisada em um
      verdadeiro traje das sombras. Esse traje concede +2 em Furtividade e
      Intimida&ccedil;&atilde;o e reduz a penalidade por armadura de sua
      armadura neste mesmo valor. Este b&ocirc;nus (e a redu&ccedil;&atilde;o na
      penalidade) aumenta em +1 para cada dois outros poderes de vigilante
      mascarado que voc&ecirc; possuir. Se perder seu traje, voc&ecirc; pode
      criar outro com um dia de trabalho e o gasto de T$ 100.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisitos:</em> treinado em
      Furtividade, Intimida&ccedil;&atilde;o e Luta.</p>
