system:
  description:
    value: >-
      <blockquote>

      <p>O maior segredo de um vigilante mascarado &eacute; sua identidade
      secreta</p>

      </blockquote>

      <p class="MsoNormal">Voc&ecirc; se torna imune a todas as formas de
      detec&ccedil;&atilde;o de sua identidade secreta, incluindo
      per&iacute;cias como Intui&ccedil;&atilde;o e Percep&ccedil;&atilde;o, e
      magias, como Vis&atilde;o da Verdade. Esta imunidade protege apenas sua
      identidade secreta; voc&ecirc; ainda pode ser detectado por
      per&iacute;cias e habilidades, mas isso nunca revelar&aacute; sua
      identidade. A &uacute;nica forma de descobrir sua identidade secreta
      &eacute; arrancando sua m&aacute;scara de seu traje das sombras enquanto
      voc&ecirc; estiver inconsciente ou paralisado.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisito:</em> Traje das Sombras.</p>
