system:
  description:
    value: >-
      <blockquote>

      <p>Nos momentos mais tensos, um Presa de Coral pode usar a magia do mar
      para limpar corpo, mente e esp&iacute;rito.</p>

      </blockquote>

      <p class="MsoNormal">Voc&ecirc; pode gastar uma a&ccedil;&atilde;o de
      movimento e 4 PM para fazer uma medita&ccedil;&atilde;o r&aacute;pida.
      Voc&ecirc; recupera 4d6 pontos de vida e pode repetir um teste de
      resist&ecirc;ncia contra um efeito que esteja o afetando. Al&eacute;m
      disso, at&eacute; o in&iacute;cio de seu pr&oacute;ximo turno voc&ecirc;
      recebe +2 em testes de per&iacute;cia (exceto Luta e Pontaria). Para cada
      dois outros poderes de Presa de Coral que voc&ecirc; possui, este
      b&ocirc;nus aumenta em +1 e cada dado e cura do efeito aumenta em um
      passo.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisito</em>: um poder de Presa de
      Coral.</p>
