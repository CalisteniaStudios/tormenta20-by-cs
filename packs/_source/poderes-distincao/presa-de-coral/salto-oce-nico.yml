name: Salto Oceânico
type: poder
img: systems/tormenta20/icons/poderes/distincao.webp
system:
  description:
    value: >-
      <blockquote>

      <p style="text-align: justify;">Os Presas de Coral s&atilde;o t&atilde;o
      integrados ao oceano que podem nadar at&eacute; mesmo em terra firme.</p>

      </blockquote>

      <p class="MsoNormal" style="text-align: justify;">Voc&ecirc; recebe
      deslocamento de nata&ccedil;&atilde;o igual ao seu deslocamento (caso
      j&aacute; possua deslocamento de nata&ccedil;&atilde;o, ele aumenta em 6
      metros). Al&eacute;m disso, voc&ecirc; aprende e pode lan&ccedil;ar a
      magia Salto Dimensional sem precisar de gestos ou palavras, e pode
      lan&ccedil;&aacute;-la como uma a&ccedil;&atilde;o de movimento se estiver
      imerso na &aacute;gua, sob a chuva ou em solo molhado, mas nunca pode
      lan&ccedil;&aacute;-la em outros alvos.</p>

      <p class="MsoNormal" style="text-align:
      justify;"><em>Pr&eacute;-requisito</em>: um poder de Presa de Coral.</p>
