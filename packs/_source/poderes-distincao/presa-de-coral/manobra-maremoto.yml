name: Manobra Maremoto
type: poder
img: systems/tormenta20/icons/poderes/distincao.webp
system:
  description:
    value: >-
      <blockquote>

      <p>Quando um guerreiro khubariano de elite decide que vai atingir um alvo,
      nada pode det&ecirc;-lo.</p>

      </blockquote>

      <p class="MsoNormal">Quando faz uma investida empunhando uma lan&ccedil;a
      ou duas espadas, voc&ecirc; pode gastar 4 PM para iniciar uma manobra
      maremoto. At&eacute; o final da rodada, seu deslocamento aumenta em +6m e
      voc&ecirc; ignora terreno dif&iacute;cil. Enquanto executa essa investida,
      voc&ecirc; pode superar objetos inanimados e criaturas em seu caminho.
      Contra objetos voc&ecirc; causa dano cr&iacute;tico autom&aacute;tico, se
      o objeto for destru&iacute;do, voc&ecirc; passa atrav&eacute;s dele.
      Contra criaturas, voc&ecirc; pode fazer uma manobra empurrar como parte da
      investida; se vencer, voc&ecirc; empurra a criatura 1,5m para o lado. Sua
      investida &eacute; interrompida se voc&ecirc; falhar em destruir um objeto
      ou empurrar uma criatura desta forma. Por fim, ao final da investida,
      voc&ecirc; faz seu ataque normalmente, com +1 na rolagem de dano para cada
      dois outros poderes de Presa de Coral que possuir.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisito</em>: um poder de Presa de
      Coral.</p>
