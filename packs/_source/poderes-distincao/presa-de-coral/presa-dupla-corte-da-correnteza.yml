name: 'Presa Dupla: Corte da Correnteza'
type: poder
img: systems/tormenta20/icons/poderes/distincao.webp
system:
  description:
    value: >-
      <blockquote>

      <p style="text-align: justify;">Os Presas de Coral aprendem a usar espadas
      em pares para atacar de forma implac&aacute;vel e replicar a intensidade
      da correnteza mar&iacute;tima.</p>

      </blockquote>

      <p class="MsoNormal" style="text-align: justify;">Voc&ecirc; recebe +1 nas
      rolagens de dano com cimitarras, espadas curtas e espadas longas; para
      cada dois outros poderes de Presa de Coral que possuir, este b&ocirc;nus
      aumenta em +1. Al&eacute;m disso, se estiver empunhando duas dessas armas,
      voc&ecirc; pode gastar uma a&ccedil;&atilde;o padr&atilde;o e 4 PM para
      gir&aacute;-las em um arco e invocar um redemoinho de &aacute;gua salgada.
      Fa&ccedil;a um ataque corpo a corpo com cada uma das armas e compare-os
      com a Defesa de cada inimigo adjacente. Ent&atilde;o, fa&ccedil;a uma
      rolagem de dano para cada ataque, e aplique o resultado correspondente a
      cada inimigo atingido. Inimigos atingidos pelos dois ataques ficam
      sangrando.</p>

      <p class="MsoNormal" style="text-align:
      justify;"><em>Pr&eacute;-requisitos</em>: treinado em Iniciativa, Luta e
      Reflexos, Estilo de Duas Armas.</p>
