    value: >-
      <blockquote>

      <p>O xerife do Sol est&aacute; acostumado a receber os mais severos golpes
      e mesmo assim continuar de p&eacute;; ele sabe que, se cair,
      ningu&eacute;m ir&aacute; ajud&aacute;-lo.</p>

      </blockquote>

      <p class="MsoNormal">Uma vez por rodada, quando sofre dano, voc&ecirc;
      pode gastar uma rea&ccedil;&atilde;o e 1 PM para receber resist&ecirc;ncia
      a dano 5 at&eacute; o in&iacute;cio de seu pr&oacute;ximo turno. Para cada
      dois outros poderes de xerife do Sol, voc&ecirc; pode gastar +1 PM quando
      usa este poder para aumentar em +5 a RD recebida.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisitos:</em> Eu Sou a Lei,
      Vitalidade.</p>
