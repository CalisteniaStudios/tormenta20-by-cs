name: Caçador de Bandidos
type: poder
img: systems/tormenta20/icons/poderes/distincao.webp
system:
  description:
    value: >-
      <blockquote>

      <p>Um ca&ccedil;ador implac&aacute;vel, o xerife do Sol empenha sua alma e
      honra ao perseguir malfeitores.</p>

      </blockquote>

      <p class="MsoNormal">Uma vez por aventura, ao final de qualquer cena,
      voc&ecirc; pode escolher um indiv&iacute;duo, como Spencer, o Pistoleiro
      Tatuado, ou um pequeno grupo, como o Bando dos MacDugals ou os orcs da
      Caverna do Musgo, como sua presa (o mestre tem a palavra final sobre se um
      grupo se qualifica para este poder). At&eacute; o final da aventura,
      voc&ecirc; recebe +2 em testes de per&iacute;cia (exceto testes de ataque)
      contra a presa escolhida. Para cada outros dois poderes de xerife do Sol
      que voc&ecirc; possui, este b&ocirc;nus aumenta em +1. At&eacute; a
      aventura terminar, ou at&eacute; voc&ecirc; derrotar sua presa, voc&ecirc;
      sofre uma penalidade em PM igual ao b&ocirc;nus total recebido por este
      poder.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisitos:</em> treinado em
      Investiga&ccedil;&atilde;o, Eu Sou a Lei.</p>
