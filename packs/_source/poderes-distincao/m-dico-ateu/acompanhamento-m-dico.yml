      <blockquote>

      <p>Um doutor de ateu vai cuidar bem de seu corpo e sua mente.</p>

      </blockquote>

      <p class="MsoNormal">Quando usa cuidados prolongados, seus pacientes
      recuperam o dobro de PM por descanso. Al&eacute;m disso, pelas
