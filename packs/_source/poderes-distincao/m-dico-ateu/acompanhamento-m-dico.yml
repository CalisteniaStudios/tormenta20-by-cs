      pontos de vida aumenta em +5 para cada poder de M&eacute;dico Ateu que
      voc&ecirc; possuir.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisito:</em> Medicina
      Avan&ccedil;ada.</p>
