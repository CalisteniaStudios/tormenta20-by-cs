    value: >-
      <blockquote>

      <p>O melhor doutor &eacute; aquele que faz os melhores
      rem&eacute;dios.</p>

      </blockquote>

      <p class="MsoNormal">Voc&ecirc; pode fabricar po&ccedil;&otilde;es das
      magias Curar Ferimentos e Purifica&ccedil;&atilde;o (atributo-chave
      Intelig&ecirc;ncia). Essas po&ccedil;&otilde;es n&atilde;o s&atilde;o
      m&aacute;gicas e n&atilde;o s&atilde;o afetadas por efeitos que anulem ou
      dissipem efeitos m&aacute;gicos. Al&eacute;m disso, quando voc&ecirc; usa
      um item alqu&iacute;mico que cure pontos de vida ou de mana, cada dado
      desse efeito aumenta em um passo.</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisito:</em> Maleta
      M&eacute;dica.</p>
