name: Conhecimento Anatômico
type: poder
img: systems/tormenta20/icons/poderes/distincao.webp
system:
  description:
    value: >-
      <blockquote>

      <p>Doutores costumam parecer franzinos e inofensivos, mas aprendem onde
      machucar t&atilde;o bem quanto curar.</p>

      </blockquote>

      <p class="MsoNormal">Voc&ecirc; pode gastar 1 PM e uma a&ccedil;&atilde;o
      de movimento para avaliar a anatomia de uma criatura em alcance curto que
      n&atilde;o seja um construto ou morto-vivo. Fa&ccedil;a um teste de Cura
      (CD 20 + ND da criatura). Se passar, voc&ecirc; analisa a anatomia da
      criatura e recebe +1d8 em suas rolagens de dano contra ela at&eacute; o
      fim da cena. Quando usa este poder, voc&ecirc; pode gastar +2 PM para cada
      outros dois poderes de M&eacute;dico Ateu que possuir para aumentar o
      b&ocirc;nus em dano em +1d8.</p>

      <p class="MsoNormal"><em>Pr&eacute; requisitos:</em> treinado em
      Percep&ccedil;&atilde;o, Medicina Avan&ccedil;ada.</p>
