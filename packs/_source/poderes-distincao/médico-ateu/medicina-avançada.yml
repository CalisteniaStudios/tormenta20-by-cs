system:
  description:
    value: >-
      <blockquote>

      <p>Para aqueles formados no Col&eacute;gio Real, a medicina &eacute; mais
      do que instinto, &eacute; uma ci&ecirc;ncia fundamentada na l&oacute;gica
      e raz&atilde;o.</p>

      </blockquote>

      <p class="MsoNormal">Voc&ecirc; pode usar o modificador de
      Intelig&ecirc;ncia para Cura (em vez de Sabedoria). Al&eacute;m disso, os
      dados de cura de seu poder Medicina mudam para 1d10 (em vez de 1d6).</p>

      <p class="MsoNormal"><em>Pr&eacute;-requisitos:</em> Foco em
      Per&iacute;cia (Cura), Medicina.</p>
