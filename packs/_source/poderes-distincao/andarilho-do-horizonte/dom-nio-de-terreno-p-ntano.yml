  description:
    value: >-
      <blockquote>

      <p>Outros exploradores conhecem determinados tipos de terreno. O andarilho
      do horizonte os domina.</p>

      </blockquote>

      <p style="text-align: justify;">Escolha dois tipos de terreno entre os
      tipos a seguir. Voc&ecirc; recebe os benef&iacute;cios dos tipos
      escolhidos mesmo que n&atilde;o esteja neste terreno. Voc&ecirc; pode
      escolher este poder outras vezes para terrenos diferentes.
      <em>Pr&eacute;-requisitos:</em> treinado em Conhecimento, Fortitude e
      Sobreviv&ecirc;ncia.</p>

      <p style="text-align: justify;"><strong>P&acirc;ntano.</strong> Voc&ecirc;
      recebe resist&ecirc;ncia a &aacute;cido e veneno 5.</p>
