name: Não Tenho Nome
type: poder
img: systems/tormenta20/icons/poderes/distincao.webp
system:
  description:
    value: >-
      <blockquote>

      <p>O Cavaleiro do Corvo n&atilde;o deve sentir j&uacute;bilo em combate,
      hesita&ccedil;&atilde;o ou d&uacute;vida &mdash; n&atilde;o deve sentir
      nada, apenas cumprir suas ordens e atingir seu objetivo.</p>

      </blockquote>

      <p style="text-align: justify;">Voc&ecirc; aprende a L&iacute;ngua dos
      Corvos e se torna imune a medo. Al&eacute;m disso, voc&ecirc; perde a
      habilidade C&oacute;digo de Honra (caso a tenha).</p>

      <p style="text-align: justify;"><em>Pr&eacute;-requisitos:</em> treinado
      em Furtividade, Guerra e Luta, Vitalidade, Vontade de Ferro, usar
      armaduras pesadas.</p>

      <p style="text-align: justify;"><strong>A L&iacute;ngua dos
      Corvos</strong></p>

      <p style="text-align: justify;">Composta por uma combina&ccedil;&atilde;o
      de jarg&otilde;es, express&otilde;es e gestos, a L&iacute;ngua dos Corvos
      foi criada pelos Cavaleiros do Corvo para transmitir
      informa&ccedil;&otilde;es e comandos de forma silenciosa e discreta em
      qualquer cen&aacute;rio de miss&atilde;o.</p>

      <p style="text-align: justify;">A L&iacute;ngua dos Corvos funciona como o
      efeito b&aacute;sico da magia <a class="content-link" draggable="true"
      data-uuid="Compendium.tormenta20.magias.kTzPm7Dy3UqZNli8"
      data-id="kTzPm7Dy3UqZNli8" data-type="Item" data-pack="tormenta20.magias"
      data-tooltip="Magia Item">Aviso</a>, exceto que seu alcance &eacute; curto
      e voc&ecirc; n&atilde;o precisa gastar PM para us&aacute;-la em outros
      Cavaleiros do Corvo.</p>
