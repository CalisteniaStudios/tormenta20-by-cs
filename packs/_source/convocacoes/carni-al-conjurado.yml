    type: poder
    system:
      description:
        value: >-
          <p>Carni&ccedil;al: como o esqueleto, mas tem For 16, Des 16, 12 PV e
          causa 1d8+3 pontos de dano de trevas mais perda de 1d8 PV por veneno.
          Al&eacute;m disso, criaturas atingidas por um carni&ccedil;al devem
          passar num teste de Fortitude (CD igual &agrave; da magia) ou ficam
          paralisadas por 1 rodada. Uma criatura que passe no teste de
          resist&ecirc;ncia fica imune &agrave; paralisia dos carni&ccedil;ais
          por 24 horas.</p>
