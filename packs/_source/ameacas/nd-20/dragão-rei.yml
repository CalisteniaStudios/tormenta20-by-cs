          sustentada) O dragão controla os efeitos da gravidade em um cubo de
          12m de lado em alcance médio (veja pág. na 186)</section><p>Voc&ecirc;
          controla os efeitos da gravidade dentro da &aacute;rea. Ao
          lan&ccedil;ar a magia, escolha um dos efeitos abaixo. Enquanto a magia
          durar, voc&ecirc; pode usar uma a&ccedil;&atilde;o padr&atilde;o para
          mudar o efeito.</p>

          <p><em>Aumentar:</em> a gravidade fica mais forte. No in&iacute;cio de
          seus turnos, cada criatura na &aacute;rea deve fazer um teste de
          Atletismo. Se passar, fica fatigada. Se falhar, fica fatigada e
          ca&iacute;da.</p>

          <p><em>Inverter:</em> inverte a gravidade da &aacute;rea, fazendo com
          que criaturas e objetos &ldquo;caiam&rdquo; para cima, atingindo o
          topo (12m) em uma rodada. Se um obst&aacute;culo (como um teto)
          impedir o movimento das criaturas, elas sofrem 1d6 pontos de dano de
          impacto para cada 1,5m de &ldquo;queda&rdquo;. Elas podem ent&atilde;o
          se levantar e caminhar no obst&aacute;culo, de cabe&ccedil;a para
          baixo. Se n&atilde;o houver obst&aacute;culo, as criaturas e objetos
          ficam flutuando no topo da &aacute;rea afetada, sem poder sair do
          lugar. Criaturas voadoras podem se movimentar normalmente.
          Algu&eacute;m adjacente a algo que possa agarrar tem direito a um
          teste de Reflexos para evitar a &ldquo;queda&rdquo;. A criatura deve
          permanecer presa pela dura&ccedil;&atilde;o da magia; caso
          contr&aacute;rio &ldquo;cair&aacute;&rdquo;.</p>

          <p><em>Reduzir:</em> a gravidade fica mais leve. Criaturas ou objetos
          livres com at&eacute; 100kg flutuam para cima e para baixo conforme
          sua vontade, com deslocamento de voo 6m. Criaturas na &aacute;rea
          recebem +20 de b&ocirc;nus em testes de Atletismo para escalar e
          saltar. Uma criatura levitando fica inst&aacute;vel, sofrendo &ndash;2
          de penalidade em testes de ataque.</p>
        unidentified: ''
      source: Tormenta20 — Edição Jogo do Ano, pág. 186
