    system:
      description:
        value: >-
          <section class="secret">Controlar o Tempo (Padrão, 15 PM) O dragão
          controla o tempo ao seu redor (veja pág. na 187)</section><p>Aquele
          que controla o tempo controla o mundo. Escolha um dos efeitos a
          seguir.</p>

          <p><em>Congelar o tempo:</em> voc&ecirc; gera uma bolha na qual o
          tempo passa mais lentamente. Para outras criaturas, a bolha surge e
          desaparece instantaneamente, mas, para voc&ecirc;, ela dura 3 rodadas,
          durante as quais voc&ecirc; pode agir e n&atilde;o &eacute; afetado
          por efeitos cont&iacute;nuos (como chamas). Por&eacute;m, durante
          essas 3 rodadas, voc&ecirc; e quaisquer efeitos que voc&ecirc; gerar
          n&atilde;o podem sair da &aacute;rea que voc&ecirc; ocupava quando
          lan&ccedil;ou esta magia. Efeitos de &aacute;rea com
          dura&ccedil;&atilde;o maior que a da bolha voltam a agir normalmente
          quando ela termina.</p>

          <p><em>Saltar no tempo:</em> voc&ecirc; e at&eacute; 5 criaturas
          volunt&aacute;rias s&atilde;o transportadas de 1 a 24 horas para o
          futuro, desaparecendo com um brilho. Voc&ecirc;s ressurgem no mesmo
          lugar, com a mesma velocidade e orienta&ccedil;&atilde;o; do seu ponto
          de vista, nenhum tempo se passou. Se um objeto s&oacute;lido agora
          ocupa o espa&ccedil;o de uma criatura, ela ressurge na &aacute;rea
          vazia mais pr&oacute;xima.</p>

          <p><em>Voltar no tempo: </em>voc&ecirc; revive os &uacute;ltimos
          segundos. Todas as a&ccedil;&otilde;es da rodada anterior s&atilde;o
          desfeitas (incluindo perda de PV e PM). Tudo retorna &agrave;
          posi&ccedil;&atilde;o em que estava no in&iacute;cio do seu turno na
          &uacute;ltima rodada e voc&ecirc; &eacute; o &uacute;nico que sabe o
          que acontecer&aacute;. Todos os outros personagens envolvidos na cena
          devem repetir as mesmas a&ccedil;&otilde;es &mdash; exceto se
          voc&ecirc; fizer algo a respeito (como avisar seus aliados sobre o que
          vai acontecer).</p>
        unidentified: ''
      source: Tormenta20 — Edição Jogo do Ano, pág. 187
