items:
  - folder: 0V7x5o397UvG3xKP
    name: Teia
    type: poder
    img: icons/creatures/webs/web-spider-white-green.webp
    system:
      description:
        value: >-
          <p>A aranha gigante dispara teia em um quadrado de 3m de lado em
          alcance curto. Criaturas na &aacute;rea ficam enredadas (Reflexos CD
          18 evita). Uma criatura enredada pode se soltar com uma
          a&ccedil;&atilde;o completa e um teste de For&ccedil;a ou Acrobacia
          (CD 20) ou cortando a teia (cada espa&ccedil;o de 1,5m de teia tem 5
          PV e RD 5). Fogo queima a teia em duas rodadas (e liberta as
          criaturas), mas causa 1d6 pontos de dano de fogo por rodada a todas as
          criaturas nela. A aranha gigante tamb&eacute;m pode usar a teia para
          cobrir uma &aacute;rea quadrada com 6m de lado. Por sua
          semitranspar&ecirc;ncia, a teia &eacute; dif&iacute;cil de ver
          (Percep&ccedil;&atilde;o CD 20) at&eacute; ser tarde demais. Uma
          criatura que entre na &aacute;rea fica enredada. A aranha pode andar
          na pr&oacute;pria teia sem se enredar. Ela percebe automaticamente
          (como se tivesse percep&ccedil;&atilde;o &agrave;s cegas) qualquer
          criatura na teia</p>
