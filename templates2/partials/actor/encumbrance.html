<div class="encumbrance" title="{{localize T20.Encumbrance}}">
	<span class="encumbrance-bar" style="width:{{system.attributes.carga.pct}}%"></span>
	<span class="encumbrance-label">
		{{system.attributes.carga.value}} / {{system.attributes.carga.max}}
	</span>
	<i class="encumbrance-breakpoint encumbrance-30 arrow-up"></i>
	<i class="encumbrance-breakpoint encumbrance-30 arrow-down"></i>
</div>
