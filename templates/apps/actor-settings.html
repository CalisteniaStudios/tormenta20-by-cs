<form autocomplete="off" onsubmit="event.preventDefault();">
	{{log this}}
	{{#if (eq object.type "character")}}
	<h2>Cabeçalho</h2>
	<div class="form-group">
		<label>Mostrar campo "Divindade"</label>
		<input type="checkbox" name="flags.tormenta20.sheet.mostrarDivindade" data-dtype="Boolean" {{checked object.data.flags.tormenta20.sheet.mostrarDivindade}}>
	</div>
	<h2>Atributos</h2>
	<div class="form-group">
		<label>Mostrar campo "Bônus Temporário"</label>
		<input type="checkbox" name="flags.tormenta20.sheet.mostrarAtributoTemp" data-dtype="Boolean" {{checked object.data.flags.tormenta20.sheet.mostrarAtributoTemp}}>
	</div>
	<h2>Itens</h2>
	<div class="form-group">
		<label>Mostrar botão de edição</label>
		<input type="checkbox" name="flags.tormenta20.sheet.botaoEditarItens" data-dtype="Boolean" {{checked object.data.flags.tormenta20.sheet.botaoEditarItens}}>
	</div>
	<h2>Perícias</h2>
	<div class="form-group">
		<label>Habilitar edição de perícias</label>
		<input type="checkbox" name="flags.tormenta20.sheet.editarPericias" data-dtype="Boolean" {{checked object.data.flags.tormenta20.sheet.editarPericias}}>
	</div>
	<div class="form-group">
		<label>Mostrar bônus de treinamento</label>
		<input type="checkbox" name="flags.tormenta20.sheet.mostrarTreino" data-dtype="Boolean" {{checked object.data.flags.tormenta20.sheet.mostrarTreino}}>
	</div>
	<h2>Magias</h2>
	<div class="form-group">
		<label>Preparar magias (para magos)</label>
		<input type="checkbox" name="flags.tormenta20.mago" data-dtype="Boolean" {{checked object.data.flags.tormenta20.mago}}>
	</div>
	{{/if}}
	{{#if (eq object.type "npc")}}
	<div class="form-group">
		<label>Editar?</label>
		<input type="checkbox" name="flags.editing" data-dtype="Boolean" {{checked object.data.flags.tormenta20.editing}}>
	</div>
	{{/if}}
	
	<button type="submit" name="submit">Submit</button>
</form>
