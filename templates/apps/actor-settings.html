<form autocomplete="off" onsubmit="event.preventDefault();">

    {{#if displays.general}}
    {{log object}}
    <div class="form-group">
        <label>Conjurador?</label>
        <input type="checkbox" name="flags.conjurador" data-dtype="Boolean" {{checked object.flags.conjurador}}>
    </div>

    <div class="form-group">
        <label>Conjuração Preparada? (Mago)</label>
        <input type="checkbox" name="flags.mago" data-dtype="Boolean" {{checked object.flags.mago}}>
    </div>

    {{/if}}

    <button type="submit" name="submit">Submit</button>
</form>
