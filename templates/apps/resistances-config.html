
<form autocomplete="off">
	<p class="notes">{{ localize "T20.ResistancesConfig"}}.</p>
	{{#each config.damageTypes as | label key | }}
	<div class="form-group">
		<label>{{label}}</label>
		{{#width (lookup ../resistences key)}}
		<input name="system.tracos.resistences.{{key}}.value" type="number" min="0" value="{{value}}"/>

		<input type="checkbox" name="system.tracos.resistences.{{key}}.vulnerabilidade" {{ checked vulnerabilidade }} />
		<input type="checkbox" name="system.tracos.resistences.{{key}}.imunidade" {{ checked imunidade }} />
		{{/width}}
	</div>
	{{/each}}
</form>
