<form class="tormenta20" autocomplete="off">
    <header class="sheet-header">
        <img class="profile-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
        <div class="">
           <table>
               <tr>
                    <th>Nome</th>
                    <th>Qtd</th>
                    <th>Peso</th>
               </tr>
               <tr>
                   <td><input type="text" name="name" value="{{item.name}}" placeholder="Nome"/></td>
                   <td><input type="text" name="data.qtd" value="{{data.qtd}}" data-dtype="Number"/></td>
                   <td><input type="text" name="data.peso" value="{{data.peso}}" data-dtype="Number"/></td>
               </tr>
           </table>
        </div>
    </header>

    {{!-- Sheet Body --}}
    <section class="sheet-body">
	{{#ifEquals item.type "armadura"}}
		<div class="form-group">
			<label>Tipo:</label>
			<div class="form-fields">
				<select class="selectatr" name="data.tipo" value={{data.tipo}} data-type="String">
				{{#select data.tipo}}
				<option value="armadura">Armadura</option>
				<option value="escudo">Escudo</option>
        <option value="outro">Outro</option>
				{{/select}}
				</select>
			</div>
		</div>
		{{#ifNotEquals data.tipo "outro"}}
		<div class="form-group">
			<label>Subtipo:</label>
			<div class="form-fields">
				<select class="selectatr" name="data.subtipo" value={{data.subtipo}} data-type="String">
				{{#select data.subtipo}}
				<option value="leve">{{#ifEquals data.tipo "armadura"}}Armadura{{else}}Escudo{{/ifEquals}} Leve</option>
				<option value="pesado">{{#ifEquals data.tipo "armadura"}}Armadura Pesada{{else}}Escudo Pesado{{/ifEquals}}</option>
				{{/select}}
				</select>
			</div>
		</div>
		{{/ifNotEquals}}
		<div class="form-group">
			<label>Bônus na Defesa:</label>
			<div class="form-fields">
				<input type="text" name="data.armadura.value" value="{{data.armadura.value}}" data-dtype="Number"/>
			</div>
		</div>
		<div class="form-group">
			<label>Penalidade de Armadura:</label>
			<div class="form-fields">
				<input type="text" name="data.armadura.penalidade" value="{{data.armadura.penalidade}}" data-dtype="Number"/>
			</div>
		</div>
	{{/ifEquals}}
    {{#ifEquals item.type "arma"}}
      <div class="form-group">
        <label>Ataque: 1d20+</label>
        <div class="form-fields">
            <input type="text" name="data.atqBns" value="{{data.atqBns}}" data-dtype="String"/>
            <select class="selectatr" name="data.pericia" value={{data.pericia}} data-type="String">
              {{#select data.pericia}}
              <option value="lut">Luta</option>
              <option value="pon">Pontaria</option>
              <option value="atu">Atuação</option>
              {{/select}}
            </select>
        </div>
      </div>
      <div class="form-group">
        <label>Dano: </label>
        <div class="form-fields">
            <input type="text" name="data.dano" value="{{data.dano}}" data-dtype="String"  placeholder="Dado de dano ex.: 1d6"/>
            <select class="selectatr" name="data.atrDan" value={{data.atrDan}} data-type="String">
                {{#select data.atrDan}}
                <option value="0">Nenhum</option>
                <option value="for">For</option>
                <option value="des">Des</option>
                <option value="con">Con</option>
                <option value="int">Int</option>
                <option value="sab">Sab</option>
                <option value="car">Car</option>
                {{/select}}
            </select>
            <input type="text" name="data.danoBns" value="{{data.danoBns}}" data-dtype="String"  placeholder="ex.: +2 , +1d6+2"/>
        </div>
      </div>
      <div class="form-group">
        <label>Tipo</label>
        <div class="form-fields">
            <input type="text" name="data.tipo" value="{{data.tipo}}" data-dtype="String"/>
        </div>
      </div>
      <div class="form-group">
        <label>Margem de Crítico</label>
        <div class="form-fields">
            <input type="text" name="data.criticoM" value="{{data.criticoM}}" data-dtype="Number"placeholder="ex.: 19"/>
        </div>
      </div>
      <div class="form-group">
        <label>Multiplicador de Crítico</label>
        <div class="form-fields">
            <input type="text" name="data.criticoX" value="{{data.criticoX}}" data-dtype="Number"/>
        </div>
      </div>
      <div class="form-group" style="width: 100%;">
        <label class="tooltip">Lancinante <i class="fas fa-question-circle"></i><div class="tooltipcontent">Crítico multiplica valores fíxos</div></label>
        <div class="form-fields">
          {{#if data.lancinante}}
          <input type="checkbox" name="data.lancinante" value="{{data.lancinante}}" checked data-dtype="Boolean"/>
          {{else}}
          <input type="checkbox" name="data.lancinante" value="{{data.lancinante}}" data-dtype="Boolean"/>
          {{/if}}
        </div>
      </div>

      <div class="form-group">
        <label>Alcance</label>
        <div class="form-fields">
            <input type="text" name="data.alcance" value="{{data.alcance}}" data-dtype="String"/>
        </div>
      </div>
      <div class="form-group">
        <label>Munição</label>
        <div class="form-fields">
            <input type="text" name="data.municao" value="{{data.municao}}" data-dtype="Number"/>
        </div>
      </div>
      <div class="form-group">
        <label>Custo PM</label>
        <div class="form-fields">
            <input type="text" name="data.custo" value="{{data.custo}}" data-dtype="Number"/>
        </div>
      </div>
    {{/ifEquals}}

    {{#ifEquals item.type "consumivel"}}
      <div class="resources flex grid">
        <div class="field flex-group-center">
            <input type="text" name="data.efeito" value="{{data.efeito}}" data-dtype="String"/>
            <label>Rolagem</label>
        </div>
      </div>
    {{/ifEquals}}
		<div class="full border">
            <label>Descrição</label>
          <textarea name="data.description" data-dtype="String">{{data.description}}</textarea>
    </div>


    </section>
</form>
